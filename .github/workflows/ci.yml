name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test suite
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Run tests
        run: bash tests/run.sh

  version-check:
    name: Version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check version strings match
        run: |
          LIB=$(grep -m1 '^VERSION=' lib/utils.sh | tr -d '"' | cut -d= -f2)
          TOOL=$(grep -m1 '^VERSION=' tools/supercharger.sh | tr -d '"' | cut -d= -f2)
          README=$(grep -oP 'version-\K[0-9]+\.[0-9]+\.[0-9]+' README.md | head -1)
          echo "lib/utils.sh:          $LIB"
          echo "tools/supercharger.sh: $TOOL"
          echo "README.md:             $README"
          if [ "$LIB" != "$TOOL" ] || [ "$LIB" != "$README" ]; then
            echo "ERROR: Version mismatch — all three must match."
            exit 1
          fi
          echo "OK: all versions are $LIB"

  shellcheck:
    name: Shellcheck
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck
        run: |
          if command -v apt-get &>/dev/null; then
            sudo apt-get install -y shellcheck
          elif command -v brew &>/dev/null; then
            brew install shellcheck
          fi

      - name: Check hooks, lib, tools, and tests for errors
        run: |
          find hooks/ lib/ tools/ tests/ -name '*.sh' -print0 | xargs -0 shellcheck --severity=error
