# Mobile App Guardrails
# Performance, battery, offline-first, platform guidelines

performance:
  critical:
    - "App launch time <2s on mid-range devices"
    - "UI thread NEVER blocked >16ms (60 FPS)"
    - "Battery drain <5% per hour during normal use"
    - "Memory usage <200MB (prevent iOS background termination)"

  high:
    - "Images compressed (WebP/AVIF, sized for device resolution)"
    - "Lazy loading for lists (RecyclerView, FlatList with pagination)"
    - "Debounce search inputs (prevent excessive API calls)"
    - "Network requests cached (reduce data usage)"
    - "Background tasks use WorkManager (Android) or BGTaskScheduler (iOS)"
    - "Release builds use ProGuard/R8 (Android) or Bitcode (iOS)"

  medium:
    - "App size <50MB (avoid WiFi-only download prompts)"
    - "Startup screens preload critical data only"
    - "Animations use native APIs (avoid JS-driven animations)"

battery:
  critical:
    - "Location tracking ONLY when needed (not continuous background)"
    - "NO polling - use push notifications or WebSockets"
    - "Wake locks released promptly"

  high:
    - "Network batching (group requests, avoid frequent small calls)"
    - "Coalesced background syncs (every 15 min, not every minute)"
    - "Adaptive refresh intervals based on battery level"
    - "Aggressive caching to avoid redundant network calls"
    - "Dark mode support (OLED battery savings)"

  medium:
    - "Analytics batched and sent daily (not real-time)"
    - "Reduce animation complexity on low battery"

offline:
  critical:
    - "Core features work offline with graceful degradation"
    - "Queue failed requests for retry when online"
    - "Offline indicator visible when network unavailable"

  high:
    - "Local-first data architecture (Realm, SQLite, AsyncStorage)"
    - "Conflict resolution for offline edits"
    - "Background sync when reconnected"
    - "Cached assets for offline viewing (images, documents)"

  medium:
    - "Progressive download for large content (chapters, maps)"
    - "Download size warnings on cellular data"

accessibility:
  critical:
    - "Support Dynamic Type (iOS) and Font Scaling (Android) 100-200%"
    - "VoiceOver (iOS) and TalkBack (Android) navigation fully functional"
    - "Touch targets ≥44x44 points (iOS HIG) or ≥48x48dp (Android Material)"
    - "Color contrast ≥4.5:1 (WCAG AA)"

  high:
    - "Labels for all interactive elements (accessibility identifiers)"
    - "Semantic grouping for screen readers"
    - "Haptic feedback for important actions"
    - "Reduced motion support (respect OS settings)"
    - "Keyboard navigation for external keyboards"

  medium:
    - "Voice control support (iOS) / Voice Access (Android)"
    - "Closed captions for video content"

platform:
  critical:
    - "iOS: Follow Human Interface Guidelines (navigation patterns, tab bars)"
    - "Android: Follow Material Design (FABs, bottom sheets, navigation drawer)"
    - "Native gestures respected (swipe back on iOS, swipe to dismiss on Android)"
    - "Deep linking configured (universal links / app links)"

  high:
    - "iOS: Use native navigation (UINavigationController, not custom)"
    - "Android: Use system back button correctly (don't trap users)"
    - "Support split-screen / multi-window (Android)"
    - "Picture-in-Picture for video (iOS 14+, Android 8+)"
    - "Widgets for home screen (iOS 14+, Android)"
    - "App Clips (iOS) / Instant Apps (Android) where applicable"

  medium:
    - "iOS: 3D Touch / Haptic Touch previews"
    - "Android: Share sheet integration"
    - "Shortcuts / Siri Intents (iOS)"

security:
  critical:
    - "NEVER store sensitive data in plain text (use Keychain/KeyStore)"
    - "API keys NOT in source code (use environment configs)"
    - "Certificate pinning for API communication"
    - "Biometric authentication (Face ID, Touch ID, fingerprint)"

  high:
    - "Encrypt local database (SQLCipher)"
    - "Obfuscate code in release builds"
    - "Root/jailbreak detection (optional graceful degradation)"
    - "Session tokens expire and refresh"
    - "Screen capture protection for sensitive screens (banking)"

  medium:
    - "Code signing and app notarization"
    - "Secure network communications only (HTTPS)"

quality:
  high:
    - "Handle background/foreground transitions gracefully"
    - "Preserve state on app kill (iOS) or process death (Android)"
    - "Pagination for infinite scroll (prevent memory leaks)"
    - "Empty states with actionable guidance"
    - "Error states with retry options"
    - "Loading states for async operations"
    - "Pull-to-refresh where applicable"

  medium:
    - "Landscape orientation support (or lock with justification)"
    - "Splash screen matches launch screen (avoid jarring transition)"
    - "Status bar style matches UI theme"

permissions:
  critical:
    - "Request permissions just-in-time (not on launch)"
    - "Explain WHY permission is needed (rationale dialogs)"
    - "Graceful degradation if permission denied"

  high:
    - "Minimal permissions requested (only what's necessary)"
    - "iOS: Request tracking permission (ATT framework) if tracking users"
    - "Android: Target latest API level (avoid deprecated permissions)"

notifications:
  high:
    - "Opt-in for push notifications (don't force)"
    - "Notification channels/categories (Android)"
    - "Actionable notifications (reply, archive, etc.)"
    - "Notification frequency limits (avoid spam)"
    - "Respect Do Not Disturb settings"

  medium:
    - "Rich notifications (images, actions)"
    - "Deep links from notifications"

enforcement:
  pre_commit:
    - "Linter rules (ESLint, SwiftLint, ktlint)"
    - "TypeScript/Swift/Kotlin strict mode"

  pre_deploy:
    - "Test on real devices (not just simulators/emulators)"
    - "Battery profiling (Instruments, Android Profiler)"
    - "Accessibility audit (Xcode Accessibility Inspector, Android Lint)"
    - "Network profiling (Charles Proxy, Flipper)"
    - "App Store / Play Store guidelines checklist"

  continuous:
    - "Crash reporting (Firebase Crashlytics, Sentry)"
    - "Performance monitoring (Firebase Performance, New Relic)"
    - "Battery usage monitoring (app not in top battery drainers)"
    - "User reviews monitoring (sentiment analysis)"

violation_handling:
  critical: "Block release (app rejection risk)"
  high: "Fix before public release or hotfix within 3 days"
  medium: "Fix in next minor version"
