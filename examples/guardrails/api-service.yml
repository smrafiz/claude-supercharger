# API Service Guardrails
# Security, performance, monitoring, reliability

security:
  critical:
    - "NEVER trust user input - validate all request bodies (Zod/Joi/express-validator)"
    - "Rate limiting REQUIRED on all public endpoints (prevent DoS)"
    - "ALWAYS use parameterized queries (prevent SQL injection)"
    - "NEVER log sensitive data (passwords, tokens, API keys, PII)"
    - "Authentication REQUIRED for non-public endpoints (JWT/OAuth2)"
    - "ALWAYS hash passwords with bcrypt (12+ rounds) or Argon2"
    - "NEVER expose stack traces in production errors"

  high:
    - "Input validation on ALL endpoints (whitelisting > blacklisting)"
    - "CORS configured correctly (whitelist origins, no * in production)"
    - "Helmet.js security headers enabled"
    - "API keys rotated regularly (90-day max)"
    - "Principle of least privilege for database access"
    - "Encrypt sensitive data at rest (AES-256)"
    - "TLS 1.2+ only (disable older protocols)"

performance:
  critical:
    - "API response time p95 <200ms (excluding external calls)"
    - "Database queries MUST use indexes (no table scans on large tables)"
    - "Connection pooling configured (prevent connection exhaustion)"
    - "Request timeout <30s (prevent hanging connections)"

  high:
    - "Caching strategy for read-heavy endpoints (Redis/Memcached)"
    - "Pagination for list endpoints (max 100 items per page)"
    - "Avoid N+1 queries (use joins or batch loading)"
    - "Compress responses (gzip/brotli for >1KB)"
    - "Async processing for long-running tasks (queues: Bull/RabbitMQ)"
    - "Database query timeout <5s"

  medium:
    - "CDN for static API documentation"
    - "HTTP/2 for multiplexing"
    - "GraphQL DataLoader for batching (if using GraphQL)"

monitoring:
  critical:
    - "ALL errors logged with context (user ID, request ID, endpoint, stack trace)"
    - "Alert on error rate >1% over 5min window"
    - "Health check endpoint (/health or /status) always available"

  high:
    - "Request tracing (correlation IDs across services)"
    - "Metrics: request count, latency (p50/p95/p99), error rate"
    - "Database connection pool monitoring"
    - "Alert on API latency p95 >500ms"
    - "Alert on 5xx rate >0.5%"
    - "Uptime monitoring from multiple regions"

  medium:
    - "API usage analytics (endpoint popularity, user behavior)"
    - "Slow query logging (>1s)"
    - "Rate limit hit monitoring"

reliability:
  critical:
    - "Database transactions for multi-step writes (prevent partial updates)"
    - "Idempotency for non-GET endpoints (prevent duplicate operations)"
    - "Graceful shutdown (finish in-flight requests before exit)"

  high:
    - "Retry logic with exponential backoff for external calls"
    - "Circuit breaker for unreliable dependencies"
    - "Database connection retry on transient failures"
    - "Automated backups (daily, 30-day retention)"
    - "Blue-green or canary deployment strategy"

  medium:
    - "Load balancing across multiple instances"
    - "Auto-scaling based on CPU/memory/request count"
    - "Database read replicas for read-heavy workloads"

quality:
  high:
    - "API versioning (/v1/, /v2/) with deprecation notices"
    - "OpenAPI/Swagger documentation auto-generated"
    - "Consistent error response format (RFC 7807 Problem Details)"
    - "Request/response validation with JSON schemas"
    - "Test coverage >80% for critical paths"

  medium:
    - "API changelog maintained"
    - "Postman/Insomnia collection for manual testing"
    - "Contract tests for API consumers"

compliance:
  critical:
    - "GDPR: User data deletion within 30 days of request"
    - "GDPR: Data export within 30 days of request"
    - "PCI DSS: No plaintext credit card storage (use Stripe/PayPal tokenization)"

  high:
    - "Audit logs for data access/modification (compliance trail)"
    - "Data retention policy enforced (auto-delete old logs)"
    - "SOC 2 controls if handling sensitive data"

enforcement:
  pre_commit:
    - "ESLint/TSLint: no-console, security rules"
    - "TypeScript: strict mode"
    - "Unit tests pass"

  pre_deploy:
    - "Integration tests pass"
    - "Security scan: npm audit, Snyk, or Dependabot"
    - "Load tests: handle 2x expected peak traffic"
    - "Database migration tests (up + down)"

  continuous:
    - "Error rate monitoring (Sentry, Datadog, New Relic)"
    - "Latency monitoring (p95 <200ms alert)"
    - "Uptime monitoring (99.9% SLA)"
    - "Security vulnerability scanning (daily)"

violation_handling:
  critical: "Block deployment, rollback if in production"
  high: "Create incident, fix within 24 hours"
  medium: "Create ticket, fix in next sprint"
