schema_version: "1.0"

# Web App Guardrails
# WCAG 2.2+, OWASP Top 10, Core Web Vitals compliance


guardrails:
  security:
    critical:
      - "NEVER use dangerouslySetInnerHTML without sanitization (DOMPurify/sanitize-html)"
      - "ALWAYS validate forms server-side (client validation is UX only)"
      - "NEVER store sensitive data in localStorage/sessionStorage (use httpOnly cookies)"
      - "ALWAYS use parameterized queries (prevent SQL injection)"
      - "NEVER expose API keys in client code (use environment variables + backend proxy)"
      - "ALWAYS implement CSRF protection on state-changing endpoints"
      - "NEVER trust user input - validate and sanitize all data"

    high:
      - "Use Content Security Policy headers to prevent XSS"
      - "Implement rate limiting on login/signup endpoints (prevent brute force)"
      - "Hash passwords with bcrypt (12+ rounds) or Argon2"
      - "Use HTTPS only (redirect HTTP → HTTPS)"
      - "Set secure cookie flags (Secure, HttpOnly, SameSite=Strict)"
      - "Validate file uploads (whitelist extensions, check MIME types, scan for malware)"

  accessibility:
    critical:
      - "ALL images must have alt text (or role='presentation' if decorative)"
      - "Keyboard navigation must work for all interactive elements (Tab, Enter, Space, Escape)"
      - "Form inputs MUST have associated labels (for or aria-label)"
      - "Focus indicators visible at all times (never use outline: none without replacement)"
      - "Color contrast ≥4.5:1 for text (WCAG AA) or ≥7:1 (WCAG AAA)"

    high:
      - "Use semantic HTML (nav, main, article, aside, footer)"
      - "ARIA roles and labels for dynamic content (live regions, modals)"
      - "Support screen readers (test with NVDA/JAWS/VoiceOver)"
      - "Skip navigation links for screen reader users"
      - "Ensure touch targets are ≥44x44px (mobile accessibility)"

  performance:
    critical:
      - "Initial bundle size <300KB gzipped (Core Web Vitals)"
      - "Largest Contentful Paint (LCP) <2.5s"
      - "Interaction to Next Paint (INP) <200ms"
      - "Cumulative Layout Shift (CLS) <0.1"

    high:
      - "Lighthouse Performance score ≥90"
      - "Lazy load images and off-screen content"
      - "Code splitting for routes (dynamic imports)"
      - "Optimize images (WebP/AVIF, responsive sizes)"
      - "Prefetch critical resources (fonts, above-fold images)"
      - "Use service workers for offline support (Progressive Web App)"

    medium:
      - "Tree shaking to remove unused code"
      - "Compress assets (Brotli/gzip)"
      - "CDN for static assets"
      - "103 Early Hints for critical resources"

  quality:
    high:
      - "NO console.log in production (use proper logging)"
      - "Error boundaries to catch React errors"
      - "Loading states for async operations (prevent confusion)"
      - "Empty states with actionable guidance"
      - "Error messages are user-friendly and actionable"

    medium:
      - "Graceful degradation for old browsers"
      - "Progressive enhancement (works without JavaScript)"
      - "Responsive design (mobile, tablet, desktop)"
      - "Print styles for printable content"

  ethics:
    critical:
      - "NEVER implement dark patterns (hidden costs, forced continuity, disguised ads)"
      - "User consent REQUIRED before data collection (GDPR compliance)"
      - "Clear unsubscribe mechanism for emails/notifications"

    high:
      - "Privacy policy accessible and readable"
      - "Cookie consent with granular control (not just Accept All)"
      - "Data deletion within 30 days of request (GDPR right to erasure)"
      - "Transparent pricing (no hidden fees)"

  compliance:
    critical:
      - "GDPR: Cookie consent with granular opt-in/opt-out before any tracking"
      - "GDPR: User data deletion within 30 days of request"
      - "GDPR: Data export available within 30 days of request"

    high:
      - "CCPA: 'Do Not Sell My Personal Information' link visible to California users"
      - "CCPA: Privacy policy updated annually with data collection details"
      - "Cookie consent banner with reject-all option (ePrivacy Directive)"
      - "Third-party cookie usage disclosed and consent collected"

    medium:
      - "Cookie categories clearly defined (necessary, analytics, marketing)"
      - "Consent preferences persisted and re-requestable"
      - "Data processing agreements with third-party services"

  enforcement:
    pre_commit:
      - "ESLint: no-console, jsx-a11y rules enabled"
      - "TypeScript: strict mode"
      - "Husky pre-commit hooks: lint + type-check"

    pre_deploy:
      - "Lighthouse CI: Performance ≥90, Accessibility ≥95, Best Practices ≥90"
      - "npm audit: Zero high/critical vulnerabilities"
      - "axe-core accessibility tests pass"
      - "Bundle size check: Initial <300KB gzipped"

    continuous:
      - "Sentry: Error rate alert if >1% over 5min"
      - "Core Web Vitals monitoring (p75 thresholds)"
      - "Uptime monitoring (99.9% SLA)"

  violation_handling:
    critical: "Block deployment until fixed"
    high: "Require manual override with justification"
    medium: "Create tracking issue, fix in next sprint"
