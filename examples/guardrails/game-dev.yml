# Game Development Guardrails
# Performance, comfort, accessibility, ethical engagement

performance:
  critical:
    - "Maintain target framerate (60 FPS console, 90 FPS VR) at all times"
    - "Frame time budget: 16.67ms (60 FPS) or 11.11ms (90 FPS)"
    - "NO frame drops during gameplay (loading screens acceptable)"
    - "Memory allocation per frame <1MB (prevent GC pauses)"

  high:
    - "LOD (Level of Detail) system for 3D models"
    - "Occlusion culling to avoid rendering hidden objects"
    - "Object pooling for frequently spawned entities (bullets, particles)"
    - "Texture streaming for large worlds"
    - "Asset bundles <100MB per load"
    - "Shader compile times <5s"

  medium:
    - "Multithreading for physics/AI (off main thread)"
    - "Async asset loading with progress indicators"
    - "Batching draw calls (reduce CPU overhead)"
    - "Compressed textures (ASTC, ETC2, DXT)"

comfort:
  critical:
    - "NEVER induce motion sickness (smooth camera, avoid sudden acceleration)"
    - "VR: NO forced camera rotation (user controls head movement)"
    - "VR: Locomotion options (teleport, smooth, comfort vignette)"
    - "VR: IPD (interpupillary distance) adjustment available"
    - "VR: 90 FPS minimum (latency <20ms head-to-photon)"

  high:
    - "Camera shake optional (accessibility setting)"
    - "FOV (field of view) adjustment (80-110° range)"
    - "Motion blur optional (some users experience nausea)"
    - "Screen shake optional (photosensitivity)"
    - "VR: Snap turning option (reduce nausea vs smooth turning)"
    - "VR: Comfort mode teleportation (blink transitions)"

  medium:
    - "Head bob optional (first-person games)"
    - "Dynamic FOV during sprinting optional"

accessibility:
  critical:
    - "Colorblind modes (Protanopia, Deuteranopia, Tritanopia)"
    - "Subtitles for all dialogue (size, background, positioning adjustable)"
    - "Remappable controls (keyboard, gamepad, mouse)"
    - "Difficulty options (or adaptive difficulty)"

  high:
    - "Audio cues visual representation (closed captions for sounds)"
    - "One-handed mode support where feasible"
    - "UI scaling (125%, 150%, 200%)"
    - "High contrast mode"
    - "Text-to-speech for UI (screen reader support)"
    - "Photosensitivity warning if flashing lights present"
    - "Toggle for screen shake, camera shake, motion blur"

  medium:
    - "Assist mode (auto-aim, increased health, slower enemies)"
    - "Pause during cutscenes"
    - "Skip QTE (quick-time events) option"

ethics:
  critical:
    - "NEVER implement predatory monetization (loot boxes targeting children, pay-to-win)"
    - "NEVER use dark patterns (hidden costs, fake scarcity, forced wait times)"
    - "NEVER exploit addiction mechanics (variable ratio rewards without spending limits)"
    - "Clear and transparent pricing (no surprise charges)"

  high:
    - "Parental controls for in-game purchases"
    - "Spending limits enforceable"
    - "Loot box odds disclosed (if present)"
    - "No 'fear of missing out' tactics (limited-time exclusive items)"
    - "Energy systems should NOT gate core gameplay (cosmetic acceptable)"
    - "Fair matchmaking (no pay-to-win advantages)"

  medium:
    - "Ethical use of analytics (no spyware, respect privacy)"
    - "Age-appropriate content warnings"
    - "Toxicity moderation in multiplayer"

quality:
  high:
    - "Autosave frequently (every 5 min or checkpoint)"
    - "Manual save option available"
    - "Save corruption prevention (backup saves)"
    - "Loading screens show progress (not infinite spinners)"
    - "Tutorial skippable for experienced players"
    - "Graceful degradation on low-end hardware"

  medium:
    - "Settings persist across sessions"
    - "Resolution and graphics quality adjustable"
    - "Windowed/fullscreen/borderless options"
    - "V-Sync toggle"

networking:
  critical:
    - "Client-side prediction to hide latency"
    - "Lag compensation for hit detection"
    - "NO rubberbanding in normal network conditions (<150ms ping)"

  high:
    - "Graceful handling of disconnects (reconnect option)"
    - "Host migration for peer-to-peer games"
    - "Anti-cheat measures (server authority, input validation)"
    - "Tick rate ≥30 Hz (competitive games ≥60 Hz)"

  medium:
    - "Region-based matchmaking (reduce ping)"
    - "Ping display in matchmaking"

enforcement:
  pre_commit:
    - "Linter rules for performance (no GameObject.Find in Update)"
    - "Code review for comfort violations"

  pre_deploy:
    - "Performance profiling on target hardware"
    - "Accessibility checklist verified"
    - "Playtesting with diverse players (colorblind, mobility impaired)"
    - "Motion sickness testing (VR games)"

  continuous:
    - "Frame rate monitoring (alert if <target 95% of time)"
    - "Crash reporting (Sentry, Unity Analytics)"
    - "Player feedback monitoring (toxicity, monetization complaints)"

violation_handling:
  critical: "Block release until fixed (performance, comfort, predatory monetization)"
  high: "Fix before 1.0 release or patch within 1 week"
  medium: "Fix in next content update"
